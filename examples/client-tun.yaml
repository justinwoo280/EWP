# Linux desktop TUN client. Captures every TCP/UDP flow on the
# system, runs them through an EWP v2 tunnel to the upstream VPS.
# FakeIP DNS lives entirely on-device (zero-RTT for :53), Real-IP
# flows preserve their remote src so STUN / WebRTC / Full-Cone
# semantics are intact.
#
# Run as root (TUN device + route table need CAP_NET_ADMIN).
# Stop with Ctrl-C; routes and TUN are torn down automatically.
#
# No bypass-dialer plumbing: sing-tun's DefaultInterfaceMonitor
# learns the physical egress NIC continuously and dialer Control
# funcs always bind to the current default interface, so the
# outbound's own connection never loops through our TUN.

inbounds:
  - tag: tun-in
    type: tun
    tun:
      address: "10.233.0.2/24"
      address_v6: "fd00:5ca1:e::2/64"   # optional, omit if you don't need v6
      dns:
        - "10.233.0.1"
        - "fd00:dead:beef::1"
      mtu: 1420
      fake_ip: true

outbounds:
  - tag: my-vps
    type: ewpclient
    uuid: "01020304-0506-0708-090a-0b0c0d0e0f10"
    transport:
      kind: websocket
      url: "wss://example.com/ewp"
      sni: "example.com"
      ech: true

router:
  default: my-vps

client:
  doh:
    servers:
      - "https://1.1.1.1/dns-query"
      - "https://dns.google/dns-query"
