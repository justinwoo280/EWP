# Local SOCKS5 proxy on 127.0.0.1:1080 forwarding through an EWP
# v2 tunnel (X25519+ML-KEM-768 hybrid, ChaCha20-Poly1305).

inbounds:
  - tag: local-socks
    type: socks5
    listen: "127.0.0.1:1080"
    # Uncomment to require authentication (recommended for non-loopback):
    # users:
    #   alice: "s3cret"

outbounds:
  - tag: my-vps
    type: ewpclient
    uuid: "01020304-0506-0708-090a-0b0c0d0e0f10"
    transport:
      kind: websocket
      url: "wss://example.com/ewp"
      sni: "example.com"
      ech: true

router:
  default: my-vps

# client.doh.servers is the only client-side DoH knob. It is used
# at startup, exactly once, to (a) resolve the upstream EWP server's
# domain to an IP and (b) fetch the ECH HTTPS RR. After bootstrap
# completes the client never touches DoH again — application DNS
# traffic just rides the tunnel like any other UDP flow.
#
# Omit entirely to fall back to the built-in default (AliDNS
# 223.5.5.5 / 223.6.6.6 + Tencent doh.pub), which works from
# networks that block 1.1.1.1 / 8.8.8.8.
client:
  doh:
    servers:
      - "https://1.1.1.1/dns-query"
      - "https://dns.google/dns-query"
