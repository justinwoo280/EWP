name: Create Release

# v2 release flow: tag + build the unified cmd/ewp binary across the
# matrix, build the gomobile aar, build the Android apk, build the
# Qt6 GUI, attach all of them to a GitHub release.
#
# Trigger manually with a semver tag (vMAJOR.MINOR[.PATCH][-pre]).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2.0.0 or v2.0.0-rc.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

jobs:
  # ----------------------------------------------------------------
  # Validate the version string and create a git tag pointing at the
  # commit being released. Subsequent jobs check out THAT tag so the
  # binary embedded version metadata always matches what's released.
  # ----------------------------------------------------------------
  prepare:
    name: Validate & Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        run: |
          V='${{ github.event.inputs.version }}'
          [[ $V =~ ^v[0-9]+(\.[0-9]+){1,2}(-[A-Za-z0-9.]+)?$ ]] || {
            echo "::error::version must look like v2.0 / v2.0.0 / v2.0-rc.1"
            exit 1
          }

      - name: Tag
        run: |
          git config user.name  github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git tag -a "${{ github.event.inputs.version }}" -m "Release ${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

  # ----------------------------------------------------------------
  # cmd/ewp matrix build with embedded version stamp.
  # ----------------------------------------------------------------
  ewp-binary:
    name: ewp ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: prepare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ewp-core
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: ""   }
          - { goos: linux,   goarch: arm64, suffix: ""   }
          - { goos: darwin,  goarch: amd64, suffix: ""   }
          - { goos: darwin,  goarch: arm64, suffix: ""   }
          - { goos: windows, goarch: amd64, suffix: .exe }
          - { goos: windows, goarch: arm64, suffix: .exe }
          - { goos: freebsd, goarch: amd64, suffix: ""   }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: ewp-core/go.sum

      - name: Build
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          NAME=ewp-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" \
            -o "../$NAME" \
            ./cmd/ewp
          ( cd .. && sha256sum "$NAME" > "$NAME.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: ewp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ewp-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
            ewp-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}.sha256
          if-no-files-found: error

  # ----------------------------------------------------------------
  # Qt6 GUI (linux only).
  # ----------------------------------------------------------------
  ewp-gui:
    name: GUI (linux)
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Install Qt6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y --no-install-recommends qt6-base-dev ninja-build

      - run: cmake -S ewp-gui -B ewp-gui/build -G Ninja
      - run: ninja -C ewp-gui/build
      - run: |
          mv ewp-gui/build/EWP-GUI ewp-gui-${{ github.event.inputs.version }}-linux-amd64
          sha256sum ewp-gui-${{ github.event.inputs.version }}-linux-amd64 \
            > ewp-gui-${{ github.event.inputs.version }}-linux-amd64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ewp-gui-linux
          path: |
            ewp-gui-${{ github.event.inputs.version }}-linux-amd64
            ewp-gui-${{ github.event.inputs.version }}-linux-amd64.sha256
          if-no-files-found: error

  # ----------------------------------------------------------------
  # Android: gomobile aar then assembleRelease.
  # ----------------------------------------------------------------
  android:
    name: Android APK
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: ewp-core/go.sum

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: gomobile bind
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          cd ewp-core
          gomobile bind -target=android -androidapi=21 \
            -ldflags="-s -w -X main.Version=${{ github.event.inputs.version }}" \
            -o ../ewp-android/app/libs/ewp-core.aar ./ewpmobile

      - name: Build apk (release, unsigned)
        working-directory: ewp-android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Stage artefacts
        run: |
          mkdir -p out
          for abi in arm64-v8a armeabi-v7a x86_64 universal; do
            apk=$(ls ewp-android/app/build/outputs/apk/release/*-$abi-release-unsigned.apk 2>/dev/null || true)
            [ -n "$apk" ] || continue
            name=ewp-android-${{ github.event.inputs.version }}-$abi.apk
            cp "$apk" "out/$name"
            ( cd out && sha256sum "$name" > "$name.sha256" )
          done
          ls out/

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: out/*
          if-no-files-found: error

  # ----------------------------------------------------------------
  # Final: gather everything and publish a GitHub release.
  # ----------------------------------------------------------------
  release:
    name: Publish GitHub release
    needs: [ ewp-binary, ewp-gui, android ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List
        run: ls -lhR dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.event.inputs.version }}
          name:       ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: dist/*
