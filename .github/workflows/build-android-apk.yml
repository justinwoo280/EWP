name: Build Android APK

# Self-contained Android pipeline. Builds the gomobile aar in-place,
# then assembleRelease. Triggered by anything that could change either
# layer; not factored out of build.yml because we want the apk to be
# available as a single CI artefact for QA, even when build.yml is
# triggered for an unrelated reason.

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
    paths:
      - 'ewp-core/ewpmobile/**'
      - 'ewp-core/transport/**'
      - 'ewp-core/protocol/**'
      - 'ewp-core/tun/**'
      - 'ewp-core/common/**'
      - 'ewp-core/engine/**'
      - 'ewp-core/inbound/**'
      - 'ewp-core/outbound/**'
      - 'ewp-core/dns/**'
      - 'ewp-core/go.mod'
      - 'ewp-core/go.sum'
      - 'ewp-android/**'
  pull_request:
    paths:
      - 'ewp-core/ewpmobile/**'
      - 'ewp-android/**'
  workflow_dispatch:

jobs:
  build-aar:
    name: gomobile bind
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: ewp-core/go.sum

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build aar
        working-directory: ewp-core
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          mkdir -p output/android
          gomobile bind -target=android -androidapi=21 \
            -ldflags="-s -w" \
            -o output/android/ewp-core.aar ./ewpmobile

      - uses: actions/upload-artifact@v4
        with:
          name: ewp-core-aar
          path: ewp-core/output/android/ewp-core.aar
          retention-days: 1

  build-apk:
    name: Build APK
    needs: build-aar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Supply-chain hygiene: refuse to run with a tampered Gradle wrapper.
      - uses: gradle/actions/wrapper-validation@v3

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Pull aar from previous job
        uses: actions/download-artifact@v4
        with:
          name: ewp-core-aar
          path: ewp-android/app/libs/

      - name: Sanity check the aar
        run: |
          ls -la ewp-android/app/libs/
          unzip -p ewp-android/app/libs/ewp-core.aar AndroidManifest.xml | head -3 || true

      - uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        working-directory: ewp-android
        env:
          # Optional release signing — set as repo secrets to enable.
          # If absent, falls through to assembleDebug.
          SIGNING_KEYSTORE_B64:    ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD:  ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:       ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:    ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ -n "$SIGNING_KEYSTORE_B64" ]; then
            echo "$SIGNING_KEYSTORE_B64" | base64 -di > /tmp/ewp-release.jks
            export SIGNING_KEYSTORE_PATH=/tmp/ewp-release.jks
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Collect APKs
        run: |
          mkdir -p apk-output
          find ewp-android/app/build/outputs/apk \
            -name "*.apk" ! -name "*unsigned*" \
            -exec cp {} apk-output/ \;
          ls -lh apk-output/

      - uses: actions/upload-artifact@v4
        with:
          name: ewp-android-apks
          path: apk-output/
          if-no-files-found: error
