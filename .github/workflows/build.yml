name: Build EWP

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # core: go test + build the unified cmd/ewp binary across our matrix.
  # In v2 there is exactly ONE binary (cmd/ewp), runtime-configured to
  # behave as client / server / relay via YAML — no per-role builds.
  # ------------------------------------------------------------------
  core:
    name: Core ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ewp-core
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: ""   }
          - { goos: linux,   goarch: arm64, suffix: ""   }
          - { goos: darwin,  goarch: amd64, suffix: ""   }
          - { goos: darwin,  goarch: arm64, suffix: ""   }
          - { goos: windows, goarch: amd64, suffix: .exe }
          - { goos: windows, goarch: arm64, suffix: .exe }
          - { goos: freebsd, goarch: amd64, suffix: ""   }

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: ewp-core/go.sum

      # Tests run only once on linux/amd64 — protocol-level tests are
      # pure Go with no OS-specific paths, so re-running them on every
      # cross-build target wastes CI minutes.
      - name: go test
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test ./... -count=1 -timeout 120s

      - name: go vet
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go vet ./...

      - name: Build cmd/ewp
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o ../ewp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            ./cmd/ewp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ewp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ewp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          if-no-files-found: error

  # ------------------------------------------------------------------
  # gui: Qt6 desktop build (linux only — we don't ship Win/Mac GUI
  # binaries from CI; users build locally with their own Qt install).
  # ------------------------------------------------------------------
  gui:
    name: GUI (Qt6 / linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + Ninja
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y --no-install-recommends \
            qt6-base-dev ninja-build

      - name: Configure
        run: cmake -S ewp-gui -B ewp-gui/build -G Ninja

      - name: Build
        run: ninja -C ewp-gui/build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ewp-gui-linux
          path: ewp-gui/build/EWP-GUI
          if-no-files-found: error

  # ------------------------------------------------------------------
  # mobile-aar: gomobile bind, feeds ewp-android (built separately in
  # build-android-apk.yml). Pulled out so the apk job can short-circuit
  # if the aar didn't change.
  # ------------------------------------------------------------------
  mobile-aar:
    name: Android AAR (gomobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: ewp-core/go.sum

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build aar
        working-directory: ewp-core
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          gomobile bind -target=android -androidapi=21 \
            -ldflags="-s -w" \
            -o ../ewp-core.aar ./ewpmobile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ewp-core-aar
          path: ewp-core.aar
          if-no-files-found: error
